# ─────────────────────────────────────────────────────────────
# 다온 — nginx 리버스 프록시 (Cloudflare Origin Cert + Full strict)
# 설치: /etc/nginx/sites-available/daon  →  sites-enabled/ 심볼릭 링크
# ─────────────────────────────────────────────────────────────

# 80: HTTPS로 강제 리다이렉트 (Cloudflare Always Use HTTPS와 이중 안전)
server {
    listen 80;
    listen [::]:80;
    server_name daonwealth.com www.daonwealth.com;
    return 301 https://$host$request_uri;
}

# 443: TLS 종료 + 8501로 프록시
server {
    # nginx 1.18(Ubuntu 22.04)은 http2를 listen 줄에 붙임. 1.25.1+의 `http2 on;` 미지원.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daonwealth.com www.daonwealth.com;

    # Cloudflare Origin Certificate (SSL/TLS → Origin Server → Create Certificate)
    ssl_certificate     /etc/ssl/daon/cert.pem;
    ssl_certificate_key /etc/ssl/daon/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 업로드/요청 본문 한도 (CSV import 등 대비)
    client_max_body_size 10M;

    # HSTS — Cloudflare Full(strict) 전제. 적용 전 HTTPS가 완전히 동작하는지 먼저 확인할 것.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # PWA 서비스워커는 캐시 금지 (구버전 sw.js 고착 방지)
    location = /sw.js {
        proxy_pass http://127.0.0.1:8501;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;   # AI 심층분석 등 장시간 응답 대비
    }
}
